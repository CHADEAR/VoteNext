services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vote_next
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  server:
    build: ./vote_next_server
    env_file:
      - ./vote_next_server/.env
    depends_on:
      - db
    ports:
      - "4000:4000"
    volumes:
      - ./vote_next_server:/app
    command: ["npm", "run", "dev"]

  client:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./vote_next_client:/app
    env_file:
      - ./vote_next_client/.env
    depends_on:
      - server
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  db_data:
